<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PhishGuard Advanced Shield</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background-color: #161b22; padding: 30px; border-radius: 12px; border: 1px solid #30363d; width: 90%; max-width: 500px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 20px 0; background-color: #010409; border: 1px solid #30363d; color: #58a6ff; border-radius: 6px; box-sizing: border-box; }
        button { background-color: #238636; color: white; border: none; padding: 12px 20px; cursor: pointer; border-radius: 6px; width: 100%; font-weight: bold; }
        button:hover { background-color: #2ea043; }
        #resultado { margin-top: 20px; font-size: 1.1rem; padding: 10px; border-radius: 6px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🛡️ PHISHGUARD GLOBAL</h2>
    <input type="text" id="urlInput" placeholder="https://ejemplo.com">
    <button onclick="analizarReal()">ESCANEO GLOBAL</button>
    <div id="resultado"></div>
</div>

<script>
async function analizarReal() {
    const input = document.getElementById('urlInput').value.trim();
    const resDiv = document.getElementById('resultado');
    
    // Sanitización: Quitamos cualquier cosa que parezca código HTML para evitar inyecciones
    const urlSegura = input.replace(/<[^>]*>?/gm, '');

    if (!urlSegura) {
        resDiv.textContent = "Por favor, ingresa una URL válida.";
        return;
    }

    resDiv.textContent = "Analizando en bases de datos globales...";
    resDiv.style.color = "#c9d1d9";

    try {
        // Extraemos solo el dominio para la consulta
        const hostname = new URL(urlSegura.startsWith('http') ? urlSegura : `https://${urlSegura}`).hostname;
        
        const response = await fetch(`https://check.api.urlscan.io/v1/search/?q=domain:${hostname}`);
        const data = await response.json();
        
        if (data.total > 0) {
            resDiv.textContent = "ALERTA: Este dominio ha sido detectado con actividad sospechosa anteriormente.";
            resDiv.style.color = "#ff453a";
        } else {
            resDiv.textContent = "SITIO LIMPIO: No hay reportes negativos en la base de datos.";
            resDiv.style.color = "#30d158";
        }
    } catch (e) {
        resDiv.textContent = "Error al conectar. Verifica que la URL tenga formato correcto (ej: google.com).";
        resDiv.style.color = "#ff9f0a";
    }
}
</script>
</body>
</html>
